<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Blogging Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <div class="container">
        <!-- Navigation Header -->
        <header>
            <div class="logo-group">
                <h1>Auto-Blogging Portal</h1>
                <p>ऑटोमेटेड ब्लॉगिंग और कंटेंट हब</p>
            </div>
            <div class="nav-links">
                <span class="db-badge" id="dbTypeBadge">Connecting...</span>
                
                <!-- Theme Switcher Selector -->
                <select class="theme-selector" id="themeSelector" onchange="changeTheme(this.value)">
                    <option value="light">☀️ Light Theme</option>
                    <option value="dark" selected>🌙 Dark Theme</option>
                    <option value="system">🖥️ System Theme</option>
                </select>
            </div>
        </header>

        <!-- Main Blog Posts Section -->
        <main>
            <h2 style="font-size: 1.2rem; margin-bottom: 30px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-secondary);">ताज़ा ब्लॉग आर्टिकल्स (Latest Articles)</h2>
            <div class="posts-grid" id="postsGrid">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">
                    Loading articles...
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 ऑटो-ब्लॉगर सिस्टम | सभी अधिकार सुरक्षित।</p>
        </footer>
    </div>

    <script>
        // ----------------------------------------------------
        // Theme Management Script
        // ----------------------------------------------------
        function applyTheme(theme) {
            const body = document.body;
            body.classList.remove('theme-light', 'theme-dark');
            
            if (theme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                body.classList.add(isDark ? 'theme-dark' : 'theme-light');
            } else {
                body.classList.add(`theme-${theme}`);
            }
        }

        function changeTheme(theme) {
            localStorage.setItem('blog_theme', theme);
            applyTheme(theme);
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('blog_theme') || 'dark';
        document.getElementById('themeSelector').value = savedTheme;
        applyTheme(savedTheme);

        // Listen for system theme changes dynamically if system is selected
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (document.getElementById('themeSelector').value === 'system') {
                applyTheme('system');
            }
        });

        // ----------------------------------------------------
        // Hidden Admin Secret Key Handler (Ctrl + Shift + Z)
        // ----------------------------------------------------
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                window.location.href = '/login';
            }
        });

        // ----------------------------------------------------
        // Toggle Post Full Content Inline
        // ----------------------------------------------------
        window.togglePost = function(id) {
            const excerpt = document.getElementById(`excerpt_${id}`);
            const content = document.getElementById(`content_${id}`);
            const toggleLink = document.getElementById(`toggle_${id}`);
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                excerpt.style.display = 'none';
                toggleLink.innerHTML = '← छोटी पोस्ट करें';
            } else {
                content.style.display = 'none';
                excerpt.style.display = 'block';
                toggleLink.innerHTML = 'पूरी पोस्ट पढ़ें →';
            }
        };

        // ----------------------------------------------------
        // Data Fetching Scripts
        // ----------------------------------------------------
        // Fetch Database Type
        fetch('/api/db-info')
            .then(res => res.json())
            .then(data => {
                const badge = document.getElementById('dbTypeBadge');
                if (data.dbType === 'firebase') {
                    badge.innerHTML = '🔥 Firebase Firestore';
                    badge.style.borderColor = 'rgba(245, 130, 13, 0.4)';
                    badge.style.color = '#f5820d';
                } else {
                    badge.innerHTML = '📁 Local JSON Database';
                }
            })
            .catch(() => {
                document.getElementById('dbTypeBadge').innerHTML = 'Offline';
            });

        // Fetch and Render Posts
        fetch('/api/posts')
            .then(res => res.json())
            .then(posts => {
                const grid = document.getElementById('postsGrid');
                if (posts.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 50px;">
                            <h3>कोई ब्लॉग पोस्ट नहीं मिली।</h3>
                            <p>शॉर्टकट दबाकर एडमिन पैनल खोलें और ब्लॉग पोस्ट लिखना शुरू करें!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = posts.map(post => {
                    const date = new Date(post.timestamp).toLocaleDateString('hi-IN', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });
                    
                    // Generate excerpt
                    const excerptLength = 220;
                    const cleanText = post.content.replace(/<[^>]*>/g, ''); // strip HTML if any
                    const hasExcerpt = cleanText.length > excerptLength;
                    const excerpt = hasExcerpt ? cleanText.substr(0, excerptLength) + '...' : cleanText;
                    
                    return `
                        <article class="post-card" id="post_${post.id}">
                            <div class="post-category">${post.category || 'General'}</div>
                            <h3 class="post-title">${post.title}</h3>
                            <div class="post-meta">प्रकाशित: ${date}</div>
                            
                            <!-- Excerpt View -->
                            <div class="post-excerpt" id="excerpt_${post.id}">
                                ${excerpt}
                            </div>
                            
                            <!-- Full Content View (Hidden initially) -->
                            <div class="post-content" id="content_${post.id}" style="display: none;">
                                ${post.content}
                            </div>
                            
                            <!-- Read More Link -->
                            ${hasExcerpt ? `
                                <a href="javascript:void(0)" class="read-more-link" id="toggle_${post.id}" onclick="togglePost('${post.id}')">
                                    पूरी पोस्ट पढ़ें →
                                </a>
                            ` : ''}
                        </article>
                    `;
                }).join('');
            })
            .catch(err => {
                document.getElementById('postsGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: var(--danger-color); padding: 50px;">
                        <h3>त्रुटि: ब्लॉग पोस्ट लोड नहीं हो सकीं।</h3>
                    </div>
                `;
            });
    </script>
</body>
</html>
